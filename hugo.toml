baseURL = "https://trexnegro.github.io/"
languageCode = "en-us"
title = "SixSixSix"
theme = "PaperMod"
copyright = "© SixSixSix"
enableRobotsTXT = true
buildDrafts = false
buildFuture = true
buildExpired = false
pagination.pagerSize = 12

[minify]
  disableXML = true
  minifyOutput = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "github-dark"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    endLevel = 4
    ordered = false
    startLevel = 2

[params]
  env = "production"
  title = "SixSixSix"
  description = "Offensive security research — kernel exploitation, EDR evasion, Active Directory, web app security, mobile."
  keywords = ["offensive-security", "kernel", "exploitation", "edr-bypass", "byovd", "vulnerability-research"]
  author = "SixSixSix"
  DateFormat = "2006-01-02"
  defaultTheme = "auto"
  disableThemeToggle = false

  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = false
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [params.homeInfoParams]
    Title = "SixSixSix"
    Content = """
Offensive security research.

Kernel exploitation, EDR evasion, Active Directory, web app security, mobile and bug-bounty methodology.

Most posts are in **English**. Spanish-original posts are tagged `lang:es`.
"""

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/TREXNEGRO"
  [[params.socialIcons]]
    name = "rss"
    url = "index.xml"

  [params.assets]
    disableHLJS = true
    disableFingerprinting = false
    favicon = "/assets/img/avatar.png"
    favicon16x16 = "/assets/img/avatar.png"
    favicon32x32 = "/assets/img/avatar.png"
    apple_touch_icon = "/assets/img/avatar.png"
    safari_pinned_tab = "/assets/img/avatar.png"

  [params.label]
    text = "SixSixSix"
    icon = "/assets/img/avatar.png"
    iconHeight = 35

  [params.profileMode]
    enabled = false

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

[[menu.main]]
  identifier = "posts"
  name = "Posts"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "categories"
  name = "Categories"
  url = "/categories/"
  weight = 20

[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 30

[[menu.main]]
  identifier = "archives"
  name = "Archives"
  url = "/archives/"
  weight = 40

[[menu.main]]
  identifier = "search"
  name = "Search"
  url = "/search/"
  weight = 50

[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 60
