baseURL = "https://trexnegro.github.io/"
title = "SixSixSix"
theme = "PaperMod"
copyright = "© SixSixSix"
enableRobotsTXT = true
buildDrafts = false
buildFuture = true
buildExpired = false
pagination.pagerSize = 12

defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[minify]
  disableXML = true
  minifyOutput = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "github-dark"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    endLevel = 4
    ordered = false
    startLevel = 2

# -----------------------------------------------------------------------------
# Site-wide params (shared across languages)
# -----------------------------------------------------------------------------
[params]
  env = "production"
  author = "SixSixSix"
  DateFormat = "2006-01-02"
  defaultTheme = "auto"
  disableThemeToggle = false

  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = false
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/TREXNEGRO"
  [[params.socialIcons]]
    name = "rss"
    url = "index.xml"

  [params.assets]
    disableHLJS = true
    disableFingerprinting = false
    favicon = "/assets/img/avatar.png"
    favicon16x16 = "/assets/img/avatar.png"
    favicon32x32 = "/assets/img/avatar.png"
    apple_touch_icon = "/assets/img/avatar.png"
    safari_pinned_tab = "/assets/img/avatar.png"

  [params.label]
    text = "SixSixSix"
    icon = "/assets/img/avatar.png"
    iconHeight = 35

  [params.profileMode]
    enabled = false

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

# -----------------------------------------------------------------------------
# Languages — English (default, at /) and Spanish (at /es/)
# Each has its own title, description, homeInfoParams, and menu.
# PaperMod automatically renders a globe icon in the header that switches
# between configured languages.
# -----------------------------------------------------------------------------
[languages]
  # ----- English -----
  [languages.en]
    languageName = "English"
    languageCode = "en-us"
    weight = 1
    title = "SixSixSix"

    [languages.en.params]
      description = "Offensive security research — kernel exploitation, EDR evasion, Active Directory, web app security, mobile."
      keywords = ["offensive-security", "kernel", "exploitation", "edr-bypass", "byovd", "vulnerability-research"]

      [languages.en.params.homeInfoParams]
        Title = "SixSixSix"
        Content = """
Offensive security research.

Kernel exploitation, EDR evasion, Active Directory, web app security, mobile and bug-bounty methodology.

Most posts are in **English**. Spanish-original posts are tagged `lang:es`.
"""

    [[languages.en.menu.main]]
      identifier = "posts"
      name = "Posts"
      url = "/posts/"
      weight = 10
    [[languages.en.menu.main]]
      identifier = "categories"
      name = "Categories"
      url = "/categories/"
      weight = 20
    [[languages.en.menu.main]]
      identifier = "tags"
      name = "Tags"
      url = "/tags/"
      weight = 30
    [[languages.en.menu.main]]
      identifier = "archives"
      name = "Archives"
      url = "/archives/"
      weight = 40
    [[languages.en.menu.main]]
      identifier = "search"
      name = "Search"
      url = "/search/"
      weight = 50
    [[languages.en.menu.main]]
      identifier = "about"
      name = "About"
      url = "/about/"
      weight = 60

  # ----- Spanish -----
  [languages.es]
    languageName = "Español"
    languageCode = "es-es"
    weight = 2
    title = "SixSixSix"

    [languages.es.params]
      description = "Investigación de seguridad ofensiva — explotación del kernel, evasión de EDR, Active Directory, seguridad de aplicaciones web, móvil."
      keywords = ["seguridad-ofensiva", "kernel", "explotacion", "edr-bypass", "byovd"]

      [languages.es.params.homeInfoParams]
        Title = "SixSixSix"
        Content = """
Investigación de seguridad ofensiva.

Explotación del kernel Linux, evasión EDR, Active Directory, seguridad de aplicaciones web, mobile, y metodología de bug-bounty.

La mayoría de los posts están en **inglés** — usa el botón del globo arriba a la derecha para cambiar. Los posts originalmente en español tienen el tag `lang:es`.
"""

    [[languages.es.menu.main]]
      identifier = "posts"
      name = "Posts"
      url = "/es/posts/"
      weight = 10
    [[languages.es.menu.main]]
      identifier = "categories"
      name = "Categorías"
      url = "/es/categories/"
      weight = 20
    [[languages.es.menu.main]]
      identifier = "tags"
      name = "Etiquetas"
      url = "/es/tags/"
      weight = 30
    [[languages.es.menu.main]]
      identifier = "archives"
      name = "Archivos"
      url = "/es/archives/"
      weight = 40
    [[languages.es.menu.main]]
      identifier = "search"
      name = "Buscar"
      url = "/es/search/"
      weight = 50
    [[languages.es.menu.main]]
      identifier = "about"
      name = "Acerca"
      url = "/es/about/"
      weight = 60
